name: saferoute_ai_prototype
description: Risk-Aware Crowdsourced Road Hazard Detection frontend prototype.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  firebase_core: 2.32.0
  cloud_firestore: 4.17.5
  firebase_storage: 11.6.5
  js: 0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
